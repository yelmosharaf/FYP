<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a3a5c" />
  <title>Finance Digest</title>
  <style>
    /* ── Reset & tokens ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1a3a5c;
      --navy2:  #22496e;
      --blue:   #2563eb;
      --blue-l: #dbeafe;
      --green:  #16a34a;
      --green-l:#dcfce7;
      --amber:  #d97706;
      --amber-l:#fef3c7;
      --grey-l: #f3f4f6;
      --border: #e5e7eb;
      --text:   #111827;
      --muted:  #6b7280;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,.10);
    }

    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: var(--navy);
      color: #fff;
      padding: 16px 16px env(safe-area-inset-top, 0);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .3px; }
    header p  { font-size: .75rem; color: #93c5fd; margin-top: 1px; }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(.96); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-primary { background: var(--blue); color: #fff; }
    .btn-ghost   { background: rgba(255,255,255,.12); color: #fff; font-size: .8rem; padding: 7px 11px; }
    .btn-send    { background: var(--green); color: #fff; width: 100%; justify-content: center; font-size: .95rem; padding: 13px; border-radius: var(--radius); }

    /* ── Main layout ─────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 12px 12px env(safe-area-inset-bottom, 12px);
    }

    /* ── Stats bar ───────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: .78rem;
      color: var(--muted);
      box-shadow: var(--shadow);
    }
    .stat-chip strong { color: var(--text); }

    /* ── Category legend ─────────────────────────────────── */
    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .75rem;
      color: var(--muted);
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Article cards ───────────────────────────────────── */
    .cards { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      gap: 0;
    }
    .card-accent {
      width: 4px;
      flex-shrink: 0;
    }
    .card-body { padding: 11px 12px; flex: 1; min-width: 0; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }
    .card-num {
      font-size: .7rem;
      color: var(--muted);
      font-weight: 600;
      min-width: 20px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .badge-credit      { background: var(--blue-l);  color: #1d4ed8; }
    .badge-equity      { background: var(--amber-l); color: #92400e; }
    .badge-both        { background: var(--green-l); color: #15803d; }
    .badge-macro       { background: var(--grey-l);  color: var(--muted); }

    .card-source {
      font-size: .7rem;
      color: var(--muted);
      margin-left: auto;
    }

    .card-title {
      font-size: .9rem;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 6px;
    }
    .card-link {
      font-size: .75rem;
      color: var(--blue);
      text-decoration: none;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-link:hover { text-decoration: underline; }

    /* accent colours */
    .accent-credit { background: #2563eb; }
    .accent-equity { background: #d97706; }
    .accent-both   { background: #16a34a; }
    .accent-macro  { background: #9ca3af; }

    /* ── Send panel ──────────────────────────────────────── */
    .send-panel {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }
    .send-panel h2 { font-size: .9rem; font-weight: 700; margin-bottom: 4px; }
    .send-panel p  { font-size: .78rem; color: var(--muted); margin-bottom: 12px; }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1f2937;
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: .85rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
      transition: transform .3s ease;
      z-index: 999;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
      text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { background: #dc2626; }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      gap: 16px;
      color: var(--muted);
      font-size: .9rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ─────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: .9rem;
    }
    .empty svg { margin-bottom: 12px; opacity: .4; }

    /* ── Tablet / desktop: switch to table ───────────────── */
    @media (min-width: 640px) {
      main { padding: 20px; }
      header { padding: 18px 24px; }
      header h1 { font-size: 1.35rem; }
      .cards { gap: 8px; }
      .card-title { font-size: .95rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>Finance Digest</h1>
      <p id="subtitle">Equity &amp; Credit Markets</p>
    </div>
    <button class="btn btn-ghost" id="refresh-btn" onclick="loadArticles(true)">
      ↻ Refresh
    </button>
  </div>
</header>

<main>
  <!-- Send panel -->
  <div class="send-panel">
    <h2>Send today's digest</h2>
    <p id="send-desc">Generates a PDF of all articles below and emails it to elmusharf@gmail.com</p>
    <button class="btn btn-send" id="send-btn" onclick="sendEmail()">
      ✉ Send PDF to elmusharf@gmail.com
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar" style="display:none!important"></div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div> Credit</div>
    <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div> Equity &amp; Credit</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div> Equity</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9ca3af"></div> Macro</div>
  </div>

  <!-- Article list -->
  <div id="article-container">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      Fetching latest articles…
    </div>
  </div>
</main>

<!-- Toast notification -->
<div id="toast"></div>

<script>
  const categoryMeta = {
    'Credit':          { badge: 'badge-credit', accent: 'accent-credit', label: 'Credit' },
    'Equity & Credit': { badge: 'badge-both',   accent: 'accent-both',   label: 'Equity & Credit' },
    'Equity':          { badge: 'badge-equity',  accent: 'accent-equity', label: 'Equity' },
    'Macro':           { badge: 'badge-macro',   accent: 'accent-macro',  label: 'Macro' },
  };

  function getMeta(cat) {
    return categoryMeta[cat] || categoryMeta['Macro'];
  }

  function renderArticles(articles, fetchedAt) {
    const container = document.getElementById('article-container');
    const statsBar   = document.getElementById('stats-bar');
    const subtitle   = document.getElementById('subtitle');

    if (!articles.length) {
      container.innerHTML = `
        <div class="empty">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
          </svg>
          <div>No articles found. Try refreshing.</div>
        </div>`;
      return;
    }

    // Stats
    const cats = {};
    articles.forEach(a => { cats[a.category] = (cats[a.category] || 0) + 1; });
    statsBar.style.removeProperty('display');
    statsBar.innerHTML =
      `<div class="stat-chip"><strong>${articles.length}</strong> articles</div>` +
      Object.entries(cats).map(([c, n]) =>
        `<div class="stat-chip"><strong>${n}</strong> ${c}</div>`
      ).join('') +
      (fetchedAt ? `<div class="stat-chip">Updated <strong>${fetchedAt}</strong></div>` : '');

    subtitle.textContent = `${articles.length} articles — updated ${fetchedAt || ''}`;

    // Cards
    const html = articles.map((art, i) => {
      const m = getMeta(art.category);
      const link = art.link
        ? `<a class="card-link" href="${escHtml(art.link)}" target="_blank" rel="noopener">${escHtml(art.link)}</a>`
        : '';
      return `
        <div class="card">
          <div class="card-accent ${m.accent}"></div>
          <div class="card-body">
            <div class="card-meta">
              <span class="card-num">${i + 1}</span>
              <span class="badge ${m.badge}">${m.label}</span>
              <span class="card-source">${escHtml(art.source)}</span>
            </div>
            <div class="card-title">${escHtml(art.title)}</div>
            ${link}
          </div>
        </div>`;
    }).join('');

    container.innerHTML = `<div class="cards">${html}</div>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function loadArticles(force = false) {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '↻ Loading…';
    document.getElementById('article-container').innerHTML = `
      <div class="spinner-wrap"><div class="spinner"></div>Fetching latest articles…</div>`;

    try {
      const res  = await fetch('/api/articles' + (force ? '?refresh=1' : ''));
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderArticles(data.articles, data.fetched_at);
    } catch (err) {
      document.getElementById('article-container').innerHTML =
        `<div class="empty">⚠️ ${err.message}</div>`;
      showToast('Failed to load articles: ' + err.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = '↻ Refresh';
    }
  }

  async function sendEmail() {
    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Sending…';

    try {
      const res  = await fetch('/api/send-email', { method: 'POST' });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      showToast('✓ Email sent to ' + data.sent_to);
    } catch (err) {
      showToast('Failed: ' + err.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = '✉ Send PDF to elmusharf@gmail.com';
    }
  }

  let _toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (isError ? ' error' : '');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => { t.className = ''; }, 4000);
  }

  // Load on startup
  loadArticles();
</script>
</body>
</html>

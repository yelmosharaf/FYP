name: Weekly Semiconductor Export Digest

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write          # needed to commit updated semicon_history.json

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Check RESEND_API_KEY
        run: |
          if [ -z "${{ secrets.RESEND_API_KEY }}" ]; then
            echo "::error::RESEND_API_KEY secret is not set."
            exit 1
          fi

      - name: Run semiconductor export digest
        working-directory: finance_digest
        env:
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL || 'elmusharf@gmail.com' }}
          KOSIS_API_KEY:   ${{ secrets.KOSIS_API_KEY }}
        run: python semicon_export.py

      - name: Commit updated data history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add finance_digest/data/semicon_history.json
          if git diff --staged --quiet; then
            echo "No new data — history unchanged."
          else
            git commit -m "chore: update semiconductor export history [skip ci]"
            git push
          fi

name: Daily Finance Digest

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC every day (adjust to your timezone)
  workflow_dispatch:        # also allows manual "Run workflow" trigger from GitHub

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests reportlab python-dotenv

      - name: Check secrets are set
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "ERROR: RESEND_API_KEY secret is not set."
            echo "Go to: github.com/yelmosharaf/FYP > Settings > Secrets and variables > Actions"
            echo "Add a secret named RESEND_API_KEY with your key from resend.com"
            exit 1
          fi
          echo "RESEND_API_KEY is set (length: ${#RESEND_API_KEY})"

      - name: Run digest
        working-directory: finance_digest
        env:
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python digest.py
